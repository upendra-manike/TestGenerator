<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TestGenerator Panel</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel">
    <header>
      <h1>TestGenerator</h1>

</html>
